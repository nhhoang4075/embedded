; ============================================================
; PlatformIO config — ESP32 audio slave cho game2048
;
; CACH DUNG:
;   pio run -e esp32dev -t upload   (build + flash production)
;   pio device monitor              (xem log UART)
;
; HARDWARE:
;   ESP32-WROOM-32 + CH340 USB-Serial
;   MAX98357A I2S amp:  BCLK=GPIO26, LRC=GPIO25, DIN=GPIO27
;   Catalex microSD:    MISO=5, MOSI=18, SCK=19, CS=21
;   UART tu STM32:      RX=GPIO16 (USART1 PA9 cua STM32)
; ============================================================

[env:esp32dev]
; pioarduino 55.03.38-1 = Arduino-ESP32 3.3.8 + ESP-IDF 5.5.4 + GCC 14.
; Bat buoc de compile ESP8266Audio (yeu cau C++20 <span>).
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 460800
upload_resetmethod = nodemcu
build_flags     = -DCORE_DEBUG_LEVEL=3
; huge_app.csv: 3MB app partition (default 1.3MB khong du cho ESP8266Audio).
board_build.partitions = huge_app.csv

; ESP8266Audio (earlephilhower) — AudioOutputMixer mix nhieu stream
; song song, libmad decode MP3 chuan, khong can PSRAM.
lib_deps =
    earlephilhower/ESP8266Audio @ ^1.9.7
